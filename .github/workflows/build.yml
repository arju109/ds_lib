name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install GCC
      run: sudo apt-get install -y gcc make

    - name: Build library
      run: make

    - name: Run all tests
      run: make test

    - name: Check for memory leaks
      run: |
        sudo apt-get install -y valgrind
        make valgrind
